<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Extractor</title>
</head>
<body>
    <input type="text" id="videoUrl" placeholder="URL del video" style="width: 300px;">
    <button onclick="obtenerTexto()">Extraer</button>
    
    <p id="estado"></p>
    
    <textarea id="resultado" rows="20" cols="80" placeholder="El texto aparecerá aquí..."></textarea>

    <script>
        async function obtenerTexto() {
            const url = document.getElementById('videoUrl').value;
            const estado = document.getElementById('estado');
            const resultado = document.getElementById('resultado');

            if (!url) return;

            estado.innerText = 'Extrayendo...';
            resultado.value = '';

            try {
                const response = await fetch('/api/transcript', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (response.ok) {
                    resultado.value = data.transcript;
                    estado.innerText = 'Completado';
                } else {
                    estado.innerText = data.error;
                }
            } catch (error) {
                estado.innerText = 'Error de conexión con la API';
            }
        }
    </script>
</body>
</html>
